{% extends 'base.html' %}

{% block content %}

<form method="post" enctype="multipart/form-data">
	{% csrf_token %}

	{{ form.as_p }}

	<button type="submit" class="btn btn-primary">
		{% if '/update/' in request.path %}
		Update
		{% else %}
		Save
		{% endif %}
	</button>
</form>

{% endblock content %}
