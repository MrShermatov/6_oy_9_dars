{% extends 'base.html' %}

{% block title %} Mashina qo'shish {% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
	<div class="card-header bg-primary text-white">
		<h3 class="mb-0">Mashina qo'shish</h3>
	</div>
	<div class="card-body">
		<form action="" method="post" enctype="multipart/form-data">
			{% csrf_token %}
			{{ form.as_p }}
			<div class="mt-4">
				<button type="submit" class="btn btn-primary">Saqlash</button>
				<a href="{% url 'index' %}" class="btn btn-outline-secondary">Bekor qilish</a>
			</div>
		</form>
	</div>
</div>
{% endblock %}
